name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Se activa al subir etiquetas (ej. v1.0)
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutarlo manualmente

permissions:
  contents: write # Permisos necesarios para crear un Release

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, windows-11-arm]
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
            
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Construir el ejecutable con PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "PresenterPlus-${{ matrix.arch }}" python_app.py

    - name: Subir artefacto (.exe)
      uses: actions/upload-artifact@v4
      with:
        name: PresenterPlus-${{ matrix.arch }}-Exe
        path: dist/PresenterPlus-${{ matrix.arch }}.exe

    - name: Crear Release en GitHub
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/PresenterPlus-${{ matrix.arch }}.exe
        generate_release_notes: true
